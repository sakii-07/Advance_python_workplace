<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task - 6</title>
    <style>
        body{
            background:linear-gradient(to top right,purple,pink,rgb(243, 190, 190));
            background-repeat: no-repeat;
            height: 700px;
        }
        .box{
            width: 500px;
            margin: 100px auto;
            border-radius: 10px 60px;
            padding: 20px;
            border: 3px solid rgb(162, 102, 102);
            background:linear-gradient(to top right,rgb(199, 127, 199),pink,rgb(247, 198, 235));
        }
        h1{
            display: inline;
        }
        button{
            border:  none;
            border: 2px slid black;
            background-color: rgb(137, 23, 244);
            color: white;
            padding: 10px 25px;
            border-radius: 5px;
            font-size: 15px;
            margin-left: 300px;
        }
        .box1{
            border-radius: 50%;
            display: inline-block;
            background: green;
            padding: 2px 4px 2px 4px;
        }
        .box2{
            border-radius: 50%;
            display: inline-block;
            background: rgb(166, 104, 165);
            padding: 2px 8px;
            color: black;
        }
        p{
            width: 400px;
            background: white;
            color: black;
            text-align: center;
            margin-left: 35px;
            padding: 10px;
        }
        p:hover{
            background: black;
            color: white;
        }
    </style>
</head>
<body>

    <div class="box">
        <h1>Quiz</h1>
        <button>Time: <div class="box1">16</div></button>
        <hr>
        <h3>Which of the following is a server-side Java Script object</h3>
        <p id="para">Function</p>
        <p id="para">File</p>
        <p id="para">File Uploaded</p>
        <p id="para">Date</p>
        <div class="box2">1</div> of <div class="box2">8</div> Question
    </div>
    
</body>
</html>
