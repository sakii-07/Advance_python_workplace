<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task - 3</title>

    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <script src='https://kit.fontawesome.com/a076d05399.js' crossorigin='anonymous'></script>
    
    <style>

        body{
            background: linear-gradient(to right, rgb(70, 123, 245),rgb(10, 175, 240));
        }
        .box{
            width: 500px;
            padding: 50px;
            margin: 15px auto;
            background: white;
            color: black;
            border-radius: 20px;
        }
        input{
            width: 370px;
            margin: 5px 5px 5px 10px;
            border: 3px solid rgb(180, 178, 178);
            height: 60px;
            border-radius: 20px;
        }
        .box1{
            display: inline-block;
            background: rgb(172, 222, 237);
            padding: 20px 30px;
            margin: 10px;
            border-radius: 10px;
            font-size: 22px;
            font-weight: 900;
        }
        .color1{
            background: orange;
        }
        .color2{
            background: red;
            color: white;
        }
        button{
            border: none;
            border: 3px solid green;
            padding: 10px 50px;
            color: white;
            background: green;
            border-radius: 10px;
            margin: 10px;
            font-size: 22px;
            font-weight: 900;
        }

    </style>

</head>
<body>

    <div class="box">
        <input type="text">
        <div>
            <div class="box1 color1">+</i></div>
            <div class="box1 color1">-</i></div>
            <div class="box1 color1">*</i></div>
            <div class="box1 color1">/</i></div>
        </div>
        <div>
            <div class="box1">7</div>
            <div class="box1">8</div>
            <div class="box1">9</div>
            <div class="box1">4</div>
        </div>
        <div>
            <div class="box1">5</div>
            <div class="box1">6</div>
            <div class="box1">1</div>
            <div class="box1">2</div>
        </div>
        <div>
            <div class="box1">3</div>
            <div class="box1">0</div>
            <div class="box1">.</div>
            <div id="clear" class="box1 color2">C</div>
        </div>
        <button>=</button>
    </div>
    
</body>
</html>
